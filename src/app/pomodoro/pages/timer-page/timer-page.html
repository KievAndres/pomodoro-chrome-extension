<div class="timer">
  <section class="header">
    <h2>POMODORO TIMER</h2>
  </section>
  @if (currentPomodoroStatus === POMODORO_STATUS.IDLE) {
    <start-focusing-message class="start-focusing-message" (click)="startFocusingSession()" />
  } @else {
    <progress-circle class="progress-circle" [maxValue]=25 [value]=25 />
  }
</div>
