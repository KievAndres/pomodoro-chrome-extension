<svg
  width="200"
  height="200"
  viewBox="-25 -25 250 250"
  version="1.1"
  xmlns="http://www.w3.org/2000/svg"
  style="transform: rotate(-90deg)"
>
  <circle
    r="90"
    cx="100"
    cy="100"
    fill="transparent"
    stroke-width="16px"
    [attr.stroke]="background()"
  ></circle>
  <circle
    r="90"
    cx="100"
    cy="100"
    stroke-width="15"
    stroke-linecap="round"
    [attr.stroke-dashoffset]="circleProgress()"
    fill="transparent"
    stroke-dasharray="565.48px"
    [attr.stroke]="color()"
  ></circle>
  <text
    y="117px"
    font-size="52px"
    font-weight="bold"
    style="transform: rotate(90deg) translate(0px, -196px)"
    [attr.fill]="color()"
    [attr.x]="textXPosition()"
  >
    {{ value() }}
  </text>
</svg>
